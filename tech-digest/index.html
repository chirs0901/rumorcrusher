        title: '小米 17 Pro 冰封散热 3.0 详解：双层石墨烯 + 3D VC，峰值 CPU 温度压至 44°C',
        text: '小米工程师披露 17 Pro 散热系统细节：双层石墨烯导热膜（单层厚度 0.06mm）叠加三维立体均热板（面积 6,500 mm²），较上代散热面积增加 40%。实测骁龙 8 Elite Gen 5 全负载 15 分钟后 CPU 峰值温度 44°C，帧率跌幅 < 8%。三星 SDI 为其提供定制硅碳电芯，OPPO、vivo 旗舰散热方案亦同步迭代 VC + 石墨烯复合路线。',
        tags: ['小米', '散热', '均热板', '石墨烯', 'vivo', 'OPPO'],
        sources: [
          {name:'小米 官网', url:'https://www.mi.com/global/mi17pro/specs#thermal', official:true},
          {name:'vivo 官网', url:'https://www.vivo.com/en/newsroom/x300-ultra-vc-graphene-thermal-system/', official:true},
          {name:'OPPO 官网', url:'https://www.oppo.com/en/newsroom/press/find-x9-ultra-dual-vc-3d-graphene-cooling/', official:true},
          {name:'Samsung SDI 官网', url:'https://www.samsungsdi.com/column/technology/detail/silicon-carbon-custom-cell-2026.html', official:true},
          {name:'TechTimes', url:'https://www.techtimes.com/articles/xiaomi-17-pro-ice-cooling-3-0-cpu-44c-test.html'},
          {name:'Nanoreview', url:'https://nanoreview.net/en/phone/xiaomi-17-pro-thermal-benchmark'}
        ],
        verdict: 'Supported',
        wikiId: null
      }
    ]
  }
};

// ── STATE ──────────────────────────────────────────────────────
var DATES = Object.keys(DATA).sort().reverse();
var activeDate = DATES[0];
var activeCat = '全部';

// ── HELPERS ────────────────────────────────────────────────────
var CAT_ORDER = ['手机厂商动态','芯片','电池','屏显','散热','存储供应','AI行业重磅'];
function getCategories(date) {
  var present = {};
  var hasRefuted = false;
  DATA[date].items.forEach(function(i) {
    if (i.verdict === 'Refuted') { hasRefuted = true; return; }
    present[i.category] = true;
  });
  var cats = CAT_ORDER.filter(function(c) { return present[c]; });
  // 兜底：未知分类（不含已被识别为辟谣的）也显示
  DATA[date].items.forEach(function(i) {
    if (i.verdict === 'Refuted') return;
    if (CAT_ORDER.indexOf(i.category) === -1 && cats.indexOf(i.category) === -1) cats.push(i.category);
  });
  // 辟谣单独放最后
  if (hasRefuted) cats.push('辟谣');
  return ['全部'].concat(cats);
}

// ── RENDER ─────────────────────────────────────────────────────
function renderDateTabs() {
  var el = document.getElementById('dateTabs');
  el.innerHTML = DATES.map(function(d, i) {
    var label = d + (i === 0 ? ' 最新' : '');
    return '<button class="date-btn' + (d === activeDate ? ' active' : '') + '" onclick="switchDate(\'' + d + '\')">' + label + '</button>';
  }).join('');
}

function renderHero() {
  var d = DATA[activeDate];
  document.getElementById('heroDate').textContent = activeDate + ' · 硬件资讯速递';
  document.getElementById('heroTitle').textContent = d.title;
  document.getElementById('heroSub').textContent = d.sub;
  // 不再渲染数据统计 chip（采集条数/Refuted/Supported/品类数）——按用户要求隐藏
  var chips = document.getElementById('heroChips');
  if (chips) chips.style.display = 'none';
}

function renderFilters() {
  var cats = getCategories(activeDate);
  document.getElementById('filterBar').innerHTML = cats.map(function(c) {
    return '<button class="cat-btn' + (c === activeCat ? ' active' : '') + '" onclick="switchCat(\'' + c.replace(/'/g, "\\'") + '\')">' + c + '</button>';
  }).join('');
}

function renderGrid() {
  var items = DATA[activeDate].items.filter(function(i) {
    var isRefuted = (i.verdict === 'Refuted');
    if (activeCat === '全部')   return true;
    if (activeCat === '辟谣')   return isRefuted;
    return !isRefuted && i.category === activeCat;
  });

  // 「全部」标签下：按 CAT_ORDER 排序，辟谣永远放最后
  if (activeCat === '全部') {
    items = items.slice().sort(function(a, b) {
      var aRef = (a.verdict === 'Refuted') ? 1 : 0;
      var bRef = (b.verdict === 'Refuted') ? 1 : 0;
      if (aRef !== bRef) return aRef - bRef;     // 非辟谣在前，辟谣在后
      var ai = CAT_ORDER.indexOf(a.category);
      var bi = CAT_ORDER.indexOf(b.category);
      if (ai === -1) ai = 999;
      if (bi === -1) bi = 999;
      return ai - bi;                            // 同类内按 CAT_ORDER 顺序
    });
  }

  var grid = document.getElementById('grid');
  var empty = document.getElementById('empty');
  if (!items.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  grid.innerHTML = items.map(function(item) {
    var isRefuted = (item.verdict === 'Refuted');
    // 辟谣条目用统一颜色，其它走原 category
    var c = isRefuted ? CAT_COLORS['辟谣'] : (CAT_COLORS[item.category] || '#c8102e');
    var kicker = isRefuted ? ('辟谣 · ' + item.category) : item.category;

    // wiki button
    var wikiBtn = (item.wikiId && WIKI_MAP[item.wikiId])
      ? '<a class="wiki-link" href="' + WIKI_MAP[item.wikiId] + '">Wiki →</a>'
      : '';

    // tags
    var tags = item.tags.map(function(t) {
      return '<span class="tag">' + t + '</span>';
    }).join('');

    // product image (新品 / 新器件)
    var imgHtml = '';
    if (item.image) {
      imgHtml = '<div class="card-img-wrap"><img class="card-img" src="'
        + item.image + '" alt="' + (item.title || '').replace(/"/g, '&quot;')
        + '" loading="lazy" onerror="this.parentNode.style.display=\'none\'"></div>';
    }

    // sources
    var srcsHtml = '';
    if (item.sources && item.sources.length) {
      srcsHtml = '<div class="card-sources">'
        + item.sources.map(function(s) {
            return '<a class="src-link' + (s.official ? ' official' : '') + '" href="' + s.url + '" target="_blank" rel="noopener">'
              + (s.official ? '<span class="src-official-dot"></span>' : '')
              + s.name + '</a>';
          }).join('')
        + '</div>';
    }

    var verdictClass = isRefuted ? 'v-ref' : 'v-sup';
    var verdictIcon  = isRefuted ? '✗ ' : '✓ ';

    return '<div class="card">'
      + '<div class="card-top" style="background:' + c + '"></div>'
      + '<div class="card-body">'
      + '<div class="card-kicker" style="color:' + c + '">' + kicker + '</div>'
      + '<div class="card-title">' + item.title + '</div>'
      + imgHtml
      + '<div class="card-text">' + item.text + '</div>'
      + '<div class="card-tags">' + tags + '</div>'
      + '</div>'
      + '<div class="card-foot">'
      + '<span class="verdict ' + verdictClass + '">' + verdictIcon + item.verdict + '</span>'
      + wikiBtn
      + '</div>'
      + srcsHtml
      + '</div>';
  }).join('');
}

function render() {
  renderDateTabs();
  renderHero();
  renderFilters();
  renderGrid();
}

// ── ACTIONS ────────────────────────────────────────────────────
function switchDate(d) {
  activeDate = d;
  activeCat = '全部';
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function switchCat(c) {
  activeCat = c;
  renderFilters();
  renderGrid();
}

// ── INIT ───────────────────────────────────────────────────────
render();

// URL hash: deep link to date e.g. #2026-05-15
var hash = location.hash.replace('#', '');
if (hash && DATA[hash]) { activeDate = hash; activeCat = '全部'; render(); }

// bfcache: 从浏览器前进/后退缓存恢复时重新渲染
window.addEventListener('pageshow', function(e) {
  if (e.persisted) { _wt = Date.now(); render(); }
});
</script>
</body>
</html>
