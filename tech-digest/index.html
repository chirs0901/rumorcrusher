  const d = DATA[activeDate];
  document.getElementById("heroDate").textContent = activeDate + " · 每日科技简报";
  document.getElementById("heroTitle").textContent = d.title;
  document.getElementById("heroSub").textContent = d.sub;
  document.getElementById("heroChips").innerHTML = d.stats.map(s =>
    `<div class="hero-chip"><div class="v">${s.v}</div><div class="l">${s.l}</div></div>`
  ).join("");
}

function renderFilters() {
  const cats = getCategories(activeDate);
  document.getElementById("filterBar").innerHTML = cats.map(c =>
    `<button class="cat-btn${c===activeCat?" active":""}" onclick="switchCat('${c}')">${c}</button>`
  ).join("");
}

function renderGrid() {
  const items = DATA[activeDate].items.filter(i => activeCat==="全部" || i.category===activeCat);
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  if(!items.length){ grid.innerHTML=""; empty.style.display="block"; return; }
  empty.style.display="none";
  const color = CAT_COLORS[items[0]?.category] || "#c8102e";
  grid.innerHTML = items.map(item => {
    const c = CAT_COLORS[item.category] || "#c8102e";
    const wikiBtn = item.wikiId && WIKI_MAP[item.wikiId]
      ? `<a class="wiki-link" href="${WIKI_MAP[item.wikiId]}">Wiki 详情 →</a>` : "";
    const tags = item.tags.map(t =>
      `<span class="tag" onclick="filterByTag('${t}')">${t}</span>`
    ).join("");
    return `<div class="card">
      <div class="card-top" style="background:${c}"></div>
      <div class="card-body">
        <div class="card-kicker">${item.category}</div>
        <div class="card-title">${item.title}</div>
        <div class="card-text">${item.text}</div>
        <div class="card-tags">${tags}</div>
      </div>
      <div class="card-foot">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="verdict v-sup">✓ ${item.verdict}</span>
          <span class="source">${item.source}</span>
        </div>
        ${wikiBtn}
      </div>
    </div>`;
  }).join("");
}

function render() {
  renderDateTabs();
  renderHero();
  renderFilters();
  renderGrid();
}

// ── ACTIONS
function switchDate(d) {
  activeDate = d;
  activeCat = "全部";
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}
function switchCat(c) {
  activeCat = c;
  renderFilters();
  renderGrid();
}
function filterByTag(tag) {
  // find items containing this tag across current date
  const items = DATA[activeDate].items.filter(i => i.tags.includes(tag));
  if(!items.length) return;
  // switch category to the first match's category
  const cat = items[0].category;
  switchCat(cat);
}

// ── INIT
render();

// ── URL hash: support deep link to date e.g. #2026-05-15
const hash = location.hash.replace("#","");
if(hash && DATA[hash]){ activeDate=hash; activeCat="全部"; render(); }
</script>
</body>
