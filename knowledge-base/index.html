// ══════════════════════════════════════════════
// RENDER ENGINE
// ══════════════════════════════════════════════
let currentCat = 'all';
let currentDate = 'all';
let currentSearch = '';

function renderStats() {
  document.getElementById('stat-total').textContent = KB.length;
  document.getElementById('stat-supported').textContent = KB.filter(e=>e.verdict==='supported').length;
  document.getElementById('stat-ai-strategy').textContent = KB.filter(e=>e.aiStrategy).length;
  document.getElementById('stat-refuted').textContent = KB.filter(e=>e.verdict==='refuted').length;
}

function verdictClass(v) {
  if (v==='supported') return 'verdict-supported';
  if (v==='refuted') return 'verdict-refuted';
  return 'verdict-conflicting';
}
function verdictLabel(v) {
  if (v==='supported') return '<span class="text-green-700 text-xs font-bold bg-green-50 px-2 py-0.5 rounded-full">✓ 已核实</span>';
  if (v==='refuted') return '<span class="text-orange-700 text-xs font-bold bg-orange-50 px-2 py-0.5 rounded-full">❌ 已辟谣</span>';
  return '<span class="text-yellow-700 text-xs font-bold bg-yellow-50 px-2 py-0.5 rounded-full">⚠ 冲突证据</span>';
}
function catName(c) {
  const m = {brands:'📱 厂商动态',chip:'🔬 芯片',display:'🖥 屏显影像',battery:'🔋 电池',thermal:'🌡 散热',memory:'💾 存储供应',ai:'🤖 AI重磅'};
  return m[c]||c;
}

function renderEntries() {
  const container = document.getElementById('entries-container');
  const q = currentSearch.toLowerCase();

  // Determine order: cat sections
  const CATS = ['brands','chip','display','battery','thermal','memory','ai'];
  let html = '';
  let visibleTotal = 0;

  const filtered = KB.filter(e => {
    const catMatch = currentCat==='all' || e.cat===currentCat;
    const dateMatch = currentDate==='all' || e.date===currentDate;
    const searchMatch = !q || e.title.toLowerCase().includes(q) || e.summary.toLowerCase().includes(q);
    return catMatch && dateMatch && searchMatch;
  }).sort((a,b)=>b.date.localeCompare(a.date));

  if (currentCat === 'all') {
    // 按分类分组
    CATS.forEach(cat => {
      const items = filtered.filter(e=>e.cat===cat);
      if (!items.length) return;
      const catLabel = {brands:'📱 手机厂商动态',chip:'🔬 核心器件 · 芯片',display:'🖥 核心器件 · 屏显影像',battery:'🔋 核心器件 · 电池',thermal:'🌡 核心器件 · 散热',memory:'💾 核心器件 · 存储供应',ai:'🤖 AI行业重磅'}[cat]||cat;
      html += `<div class="mb-8"><h3 class="text-base font-black text-slate-700 mb-3 flex items-center gap-2 border-b border-slate-200 pb-2">${catLabel} <span class="text-xs font-normal text-slate-400">${items.length}条</span></h3>`;
      items.forEach(e => { html += renderCard(e); visibleTotal++; });
      html += `</div>`;
    });
  } else {
    filtered.forEach(e => { html += renderCard(e); visibleTotal++; });
  }

  container.innerHTML = html;
  document.getElementById('no-results').classList.toggle('hidden', visibleTotal > 0);
}

function renderCard(e) {
  const srcHtml = (e.sources||[]).map(s =>
    `<a href="${s.url}" target="_blank" rel="noopener" class="src-pill ${s.official?'official':''}">${s.official?'🏛 ':''}${s.name}</a>`
  ).join('');
  const aiFlag = e.aiStrategy ? `<span class="ai-badge text-white text-xs font-bold px-2 py-0.5 rounded-full mr-2">🤖 AI供应策略调整</span>` : '';
  return `
    <div class="entry-card visible bg-white rounded-xl shadow-sm p-5 mb-4 ${e.aiStrategy?'ai-strategy-flag':verdictClass(e.verdict)}">
      <div class="flex items-start justify-between gap-3 flex-wrap mb-2">
        <div class="flex items-center gap-2 flex-wrap">
          ${aiFlag}
          ${verdictLabel(e.verdict)}
          <span class="text-xs text-slate-400 bg-slate-50 px-2 py-0.5 rounded-full">${catName(e.cat)}</span>
          <span class="text-xs text-slate-400">${e.date}</span>
        </div>
      </div>
      <h3 class="font-bold text-slate-900 text-base leading-snug mb-2">${e.title}</h3>
      <p class="text-sm text-slate-600 leading-relaxed mb-3">${e.summary}</p>
      <div class="flex flex-wrap gap-1.5 items-center">
        <span class="text-xs text-slate-400 mr-1">信源：</span>
        ${srcHtml}
      </div>
    </div>`;
}

function renderDateButtons() {
  const dates = [...new Set(KB.map(e=>e.date))].sort((a,b)=>b.localeCompare(a));
  const row = document.getElementById('date-row');
  let html = `<button class="date-btn active text-xs px-2.5 py-1 rounded-full border font-semibold border-slate-800 bg-slate-800 text-white" data-date="all">全部</button>`;
  dates.forEach(d => {
    const label = d.slice(5); // MM-DD
    const count = KB.filter(e=>e.date===d).length;
    html += `<button class="date-btn text-xs px-2.5 py-1 rounded-full border border-slate-300 font-medium text-slate-600 hover:border-slate-600 hover:text-slate-900" data-date="${d}">${label}<span class="ml-1 text-slate-400">${count}</span></button>`;
  });
  row.innerHTML = html;
  row.querySelectorAll('.date-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      row.querySelectorAll('.date-btn').forEach(b=>{b.classList.remove('active','bg-slate-800','text-white','border-slate-800');b.classList.add('border-slate-300','text-slate-600');});
      btn.classList.add('active','bg-slate-800','text-white','border-slate-800');
      btn.classList.remove('border-slate-300','text-slate-600');
      currentDate = btn.dataset.date;
      renderEntries();
    });
  });
}

// ── Init ──
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    renderEntries();
  });
});
document.getElementById('search-box').addEventListener('input', e => {
  currentSearch = e.target.value;
  renderEntries();
});

renderStats();
renderDateButtons();
renderEntries();
</script>
</body>
</html>
