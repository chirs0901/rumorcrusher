/* LAYOUT */
.layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 52px)}

.si-type{font-size:10px;color:#aaa;line-height:1}

.d-section ul{padding-left:18px;display:flex;flex-direction:column;gap:6px}
.d-section li{font-size:14px;line-height:1.7;color:#333}

.kv-table{width:100%;border-collapse:collapse}
.kv-table tr:first-child td{padding-top:0}
.kv-table td{padding:8px 12px 8px 0;font-size:13px;vertical-align:top;border-bottom:1px solid #f0f0ec}
.kv-table td:first-child{font-weight:600;color:#555;width:130px;white-space:nowrap}

.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{text-align:left;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#999;padding:0 12px 8px 0;border-bottom:1px solid #e5e5e1}

.data-table tr:last-child td{border-bottom:none}

.tl-item:last-child::before{display:none}

// ══════════════════════════════════════
// RENDER ENGINE
// ══════════════════════════════════════
var activeId = null;
var allItems = WIKI.entities.concat(WIKI.topics);

function verdictBadge(v) {
  var map = {
    'Supported': 'vb-sup',
    'Refuted': 'vb-cau',
    'Not Enough Evidence': 'vb-neu',
    'Conflicting Evidence': 'vb-conf'
  };
  return '<span class="vbadge ' + (map[v] || 'vb-neu') + '">' + v + '</span>';
}

function renderSidebar(filter) {
  filter = filter || '';
  var low = filter.toLowerCase();

  var matchEntity = WIKI.entities.filter(function(e) {
    return !filter
      || e.name.toLowerCase().indexOf(low) !== -1
      || e.subtitle.toLowerCase().indexOf(low) !== -1
      || e.typeLabel.indexOf(filter) !== -1;
  });
  var matchTopic = WIKI.topics.filter(function(t) {
    return !filter
      || t.name.toLowerCase().indexOf(low) !== -1
      || t.subtitle.toLowerCase().indexOf(low) !== -1;
  });

  document.getElementById('entitySection').innerHTML =
    '<div class="sidebar-head">实体 · Entities</div>' +
    matchEntity.map(function(e) { return sidebarItem(e); }).join('');

  document.getElementById('topicSection').innerHTML =
    '<div class="sidebar-head">主题 · Topics</div>' +
    matchTopic.map(function(t) { return sidebarItem(t); }).join('');
}

function sidebarItem(item) {
  var isActive = item.id === activeId;
  return '<div class="sidebar-item' + (isActive ? ' active' : '') + '" onclick="showDetail(\'' + item.id + '\')" id="si-' + item.id + '">'
    + '<div class="si-icon" style="background:' + item.color + '">' + item.icon + '</div>'
    + '<div>'
    + '<div class="si-name">' + item.name + '</div>'
    + '<div class="si-type">' + item.typeLabel + ' · ' + item.firstDate + '</div>'
    + '</div>'
    + '</div>';
}

function showDetail(id) {
  activeId = id;
  var item = null;
  for (var i = 0; i < allItems.length; i++) {
    if (allItems[i].id === id) { item = allItems[i]; break; }
  }
  if (!item) return;

  // update sidebar active state
  var sidebarItems = document.querySelectorAll('.sidebar-item');
  for (var j = 0; j < sidebarItems.length; j++) {
    sidebarItems[j].classList.remove('active');
  }
  var si = document.getElementById('si-' + id);
  if (si) si.classList.add('active');

  // update breadcrumb
  document.getElementById('breadcrumbLabel').textContent = item.name;

  // build detail HTML
  var html = '<div class="detail">'
    + '<div class="detail-kicker">' + item.typeLabel + ' · ' + verdictBadge(item.verdict) + '</div>'
    + '<div class="detail-title">' + item.name + '</div>'
    + '<div class="detail-subtitle">' + item.subtitle + '</div>';

  // relations
  if (item.relations && item.relations.length) {
    html += '<div class="d-section"><h3>关联实体 / 主题</h3><div class="rel-tags">';
    item.relations.forEach(function(r) {
      html += '<button class="rel-tag ' + r.kind + '" onclick="showDetail(\'' + r.id + '\')">'
        + '<span class="rt-dot"></span>' + r.label + '</button>';
    });
    html += '</div></div>';
  }

  // sections
  item.sections.forEach(function(sec) {
    html += '<div class="d-section"><h3>' + sec.title + '</h3>';

    if (sec.type === 'kv') {
      html += '<table class="kv-table">';
      sec.rows.forEach(function(row) {
        html += '<tr><td>' + row[0] + '</td><td>' + row[1] + '</td></tr>';
      });
      html += '</table>';

    } else if (sec.type === 'para') {
      sec.text.split('\n\n').forEach(function(p) {
        html += '<p>' + p + '</p>';
      });

    } else if (sec.type === 'list') {
      html += '<ul>';
      sec.items.forEach(function(it) {
        html += '<li>' + it + '</li>';
      });
      html += '</ul>';

    } else if (sec.type === 'table') {
      html += '<table class="data-table"><thead><tr>';
      sec.headers.forEach(function(h) { html += '<th>' + h + '</th>'; });
      html += '</tr></thead><tbody>';
      sec.rows.forEach(function(row) {
        html += '<tr>';
        row.forEach(function(cell) {
          var verdictStrings = ['Supported', 'Refuted', 'Not Enough Evidence', 'Conflicting Evidence'];
          var isVerdict = verdictStrings.indexOf(cell) !== -1;
          html += '<td>' + (isVerdict ? verdictBadge(cell) : cell) + '</td>';
        });
        html += '</tr>';
      });
      html += '</tbody></table>';

    } else if (sec.type === 'timeline') {
      html += '<div class="timeline">';
      sec.items.forEach(function(tl) {
        html += '<div class="tl-item">'
          + '<div class="tl-dot' + (tl.sup ? ' sup' : '') + '"></div>'
          + '<div class="tl-content">'
          + '<div class="tl-date">' + tl.date + '</div>'
          + '<div class="tl-text">' + tl.text + '</div>'
          + '<div class="tl-verdict">' + verdictBadge(tl.verdict) + '</div>'
          + '</div>'
          + '</div>';
      });
      html += '</div>';

    } else if (sec.type === 'sources') {
      html += '<table class="data-table"><thead><tr><th>日期</th><th>来源</th><th>内容</th><th>标签</th></tr></thead><tbody>';
      sec.rows.forEach(function(row) {
        html += '<tr>'
          + '<td>' + row[0] + '</td>'
          + '<td><code style="font-size:11px;color:#888">' + row[1] + '</code></td>'
          + '<td>' + row[2] + '</td>'
          + '<td>' + verdictBadge(row[3]) + '</td>'
          + '</tr>';
      });
      html += '</tbody></table>';
    }

    html += '</div>'; // /d-section
  });

  html += '</div>'; // /detail
  document.getElementById('detailPane').innerHTML = html;
  document.getElementById('detailPane').scrollTop = 0;

  // update URL hash
  history.replaceState(null, '', '#' + id);
}

function filterSidebar(val) {
  renderSidebar(val);
  if (activeId) {
    var si = document.getElementById('si-' + activeId);
    if (si) si.classList.add('active');
  }
}

// ── INIT
renderSidebar();

// handle URL hash deep link
var initHash = location.hash.replace('#', '');
if (initHash) {
  for (var k = 0; k < allItems.length; k++) {
    if (allItems[k].id === initHash) { showDetail(initHash); break; }
  }
}

// bfcache: 从浏览器前进/后退缓存恢复时重新初始化
window.addEventListener('pageshow', function(e) {
  if (e.persisted) {
    activeId = null;
    renderSidebar();
    var h = location.hash.replace('#', '');
    if (h) {
      for (var i = 0; i < allItems.length; i++) {
        if (allItems[i].id === h) { showDetail(h); break; }
      }
    }
  }
});
</script>
