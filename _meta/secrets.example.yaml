# 密钥模板文件（这个会进git，但只有占位符）
# 真实密钥请复制此文件为 secrets.local.yaml 后填入，该文件被 .gitignore 排除

feishu:
  app_id: "cli_xxxxxxxxxxxxxxxx"
  app_secret: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  # 消息接收方：二选一
  receive_id_type: "chat_id"   # 可选: chat_id / open_id / email
  receive_id: "oc_xxxxxxxxxxxxxxxxxxxx"

github:
  username: "your_username"
  repo: "rumorcrusher"
  # 推送令牌（PAT），权限只需 repo
  token: "ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

email:
  # 163邮箱：smtp.163.com:465（SSL）；Gmail：smtp.gmail.com:587（STARTTLS）；
  # 企业邮箱按各家提供商
  smtp_host: "smtp.163.com"
  smtp_port: 465
  username: "your_account@163.com"          # 登录用户名（通常是发件邮箱）
  auth_code: "xxxxxxxxxxxxxxxx"             # 163"客户端授权码"，不是登录密码！
  from_addr: "your_account@163.com"         # 发件人显示
  recipients:
    - "dnsd@163.com"
    - "liumingxin@yeahzee.com"
