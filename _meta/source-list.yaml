# 黑名单（默认排除，引用时需特别标注）
blacklist:
  # 示例：
  # - id: example-rumor-blog
  #   name: 某频繁发软文的小站
  #   reason: 过往多次软文/未标注广告
  #   added: 2026-05-14
  # 等用户后续投喂

# 信源动态调整规则
adjustment_rules:
  - 每次质检发现该信源发布错误信息：credibility -0.05
  - 该信源被其他源交叉验证为准确：credibility +0.02
  - 连续30天无错误：自动 +0.05（上限0.98，官方源除外）
  - credibility 跌破 0.4：自动加入观察名单
  - credibility 跌破 0.2：建议人工审核是否加入黑名单
